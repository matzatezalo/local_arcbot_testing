name: Diagram Review
on:
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  detect-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      diagrams-changed: ${{ steps.generate.outputs.changed }}
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('base_sha', pr.data.base.sha);

      - uses: actions/checkout@v4

      - name: Generate and detect diagram changes
        id: generate
        uses: ./.github/actions/generate-diagrams
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          head_ref: ${{ steps.pr.outputs.head_ref }}
          base_sha: ${{ steps.pr.outputs.base_sha }}

      - name: Post diagram changes for review
        if: steps.generate.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const diagramDir = 'docs/architecture';
            let fileList = '';
            
            if (fs.existsSync(diagramDir)) {
              const dirents = fs.readdirSync(diagramDir, { withFileTypes: true });
              const files = dirents
                .filter(d => d.isFile() && d.name.endsWith('.md'))
                .map(d => `- \`${d.name}\``);
              
              if (files.length > 0) {
                fileList = '\n\n### Generated/Updated Diagram Files\n\n' + files.join('\n');
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Architecture Diagrams - Ready for Review\n\n'
                + fileList + '\n\n'
                + '👉 **View changes in the "Files changed" tab**\n\n'
                + '### Next Steps\n\n'
                + 'Provide feedback to adjust the diagrams:\n'
                + '```\n'
                + '/review Your feedback here\n'
                + '```'
            });


  request-changes:
    if: (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') && contains(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('base_sha', pr.data.base.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Post review acknowledgment
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const feedback = body.replace(/\/review\s*/i, '').trim();
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Analyzing your feedback...\n\n**Your feedback:** ${feedback}`
            });

      - name: Re-generate diagrams
        uses: ./.github/actions/generate-diagrams
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          head_ref: ${{ steps.pr.outputs.head_ref }}
          base_sha: ${{ steps.pr.outputs.base_sha }}
          comment_body: ${{ github.event.comment.body }}

      - name: Commit diagram updates
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet docs/architecture/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/architecture/
            git commit -m "feat: Updated architecture diagrams based on feedback"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ steps.pr.outputs.head_ref }}
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "committed=false" >> $GITHUB_OUTPUT
          fi
        id: commit

      - name: Post update summary
        uses: actions/github-script@v7
        with:
          script: |
            const committed = '${{ steps.commit.outputs.committed }}' === 'true';
            
            if (committed) {
              const fs = require('fs');
              const dirents = fs.readdirSync('docs/architecture', { withFileTypes: true });
              const files = dirents
                .filter(d => d.isFile() && d.name.endsWith('.md'))
                .map(d => `- \`${d.name}\``)
                .join('\n');
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Diagrams updated and committed!\n\n'
                  + files + '\n\n'
                  + '👉 **View changes in the "Files changed" tab**'
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: 'No changes needed - diagrams already match the feedback'
              });
            }