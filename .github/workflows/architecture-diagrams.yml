name: Diagram Review
on:
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  review:
    if: github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/diagram-review'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Get PR branch for comment trigger
        if: github.event_name == 'issue_comment'
        id: get_branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('base_sha', pr.data.base.sha);

      - uses: actions/checkout@v4

      - uses: ./.github/actions/generate-diagrams
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          head_ref: ${{ github.event_name == 'issue_comment' && steps.get_branch.outputs.head_ref || github.head_ref }}
          base_sha: ${{ github.event_name == 'issue_comment' && steps.get_branch.outputs.base_sha || github.event.pull_request.base.sha }}
          comment_body: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}