name: Generate Architecture Diagrams
description: Generates/updates architecture diagrams using OpenAI and SKILL.md rules

inputs:
  openai_api_key:
    description: OpenAI API key
    required: true
  github_token:
    description: GitHub token for committing back
    required: true
  head_ref:
    description: PR head branch
    required: true
  base_sha:
    description: Base commit SHA
    required: true
  comment_body:
    description: Comment that triggered the action (if any)
    required: false
    default: ''

outputs:
  changed:
    description: Whether diagrams were changed
    value: ${{ steps.check.outputs.changed }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head_ref }}
        fetch-depth: 0

    - name: Run architecture bot
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        COMMENT_BODY: ${{ inputs.comment_body }}
        BASE_SHA: ${{ inputs.base_sha }}
      run: |
        export COMMENT_BODY BASE_SHA
        bash scripts/run_architecture_bot.sh

    - name: Commit and push diagram changes
      id: check
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git add docs/architecture/ 2>/dev/null || true
        if git diff --cached --quiet docs/architecture/; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: Generated architecture diagrams"
          git push "https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ inputs.head_ref }}
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Upload diagram diff
      if: steps.check.outputs.changed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: diagram-changes
        path: diagram_changes.diff
        retention-days: 1
