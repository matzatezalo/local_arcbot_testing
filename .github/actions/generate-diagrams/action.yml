name: Generate Architecture Diagrams
description: Generates/updates architecture diagrams using OpenAI and SKILL.md rules

inputs:
  openai_api_key:
    description: OpenAI API key
    required: true
  github_token:
    description: GitHub token for committing back
    required: true
  head_ref:
    description: PR head branch
    required: true
  base_sha:
    description: Base commit SHA
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head_ref }}
        fetch-depth: 0

    - name: Determine analysis paths (first-time vs. incremental)
      id: paths
      shell: bash
      env:
        ANALYSIS_PATHS: 'src'
      run: |
        if [[ -d "docs/architecture" ]]; then
          echo "analysis_paths=$ANALYSIS_PATHS docs/architecture" >> $GITHUB_OUTPUT
          echo "Mode: Incremental update (docs/architecture/ exists)"
        else
          echo "analysis_paths=$ANALYSIS_PATHS" >> $GITHUB_OUTPUT
          echo "Mode: First-time generation (docs/architecture/ missing)"
        fi

    - name: Run architecture bot (via OpenAI)
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        OPENAI_MODEL: gpt-4.1
      run: bash ${{ github.action_path }}/../../scripts/run_architecture_bot.sh "${{ steps.paths.outputs.analysis_paths }}"

    - name: Check if diagrams changed
      id: check
      shell: bash
      run: |
        if git diff --quiet docs/architecture/; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          git diff docs/architecture/ > diagram_changes.diff
        fi

    - name: Upload diagram diff
      if: steps.check.outputs.changed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: diagram-changes
        path: diagram_changes.diff

