name: Generate Architecture Diagrams
description: Generates/updates architecture diagrams using OpenAI and SKILL.md rules

inputs:
  openai_api_key:
    description: OpenAI API key
    required: true
  github_token:
    description: GitHub token for committing back
    required: true
  head_ref:
    description: PR head branch
    required: true
  base_sha:
    description: Base commit SHA
    required: true
  comment_body:
    description: Comment that triggered the action (if any)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.head_ref }}
        fetch-depth: 0

    - name: Debug - Check directory structure
      shell: bash
      run: |
        echo "Current directory: $(pwd)"
        echo "Contents:"
        ls -la
        echo "Source files:"
        find src -type f | head -10
        echo "Docs/architecture exists? $(test -d docs/architecture && echo "YES" || echo "NO")"

    - name: Run architecture bot
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [[ -d "docs/architecture" ]]; then
          export ANALYSIS_PATHS="src docs/architecture"
        else
          export ANALYSIS_PATHS="src"
        fi
        bash scripts/run_architecture_bot.sh

    - name: Check if diagrams changed
      id: check
      shell: bash
      run: |
        if git diff --quiet docs/architecture/; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit changes if needed
      if: steps.check.outputs.changed == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add docs/architecture/
        git commit -m "Update architecture diagrams"
        git push https://x-access-token:${{ inputs.github_token }}@github.com/${{ github.repository }}.git HEAD:${{ inputs.head_ref }}
